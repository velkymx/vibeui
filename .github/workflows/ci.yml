name: CI

# Runs the build and full test suite on every push and pull request so the
# README status badge reflects real, current results instead of a hand-typed count.
on:
  push:
    branches: [main, 1.0-main]
  pull_request:
    branches: [main, 1.0-main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:run
