<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky footer - VibeUI Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../dist/vibeui.css">
</head>
<body>
    <!-- Flex column at min-vh-100 keeps the footer pinned to the bottom when content is short. -->
    <div id="app" class="d-flex flex-column min-vh-100">
        <header class="border-bottom">
            <vibe-container class="d-flex align-items-center justify-content-between py-3">
                <a href="#" class="d-flex align-items-center text-dark text-decoration-none">
                    <vibe-icon icon="layers-fill" class="me-2 fs-5"></vibe-icon>
                    <span class="fw-bold">Sticky</span>
                </a>
                <vibe-nav :items="navItems"></vibe-nav>
            </vibe-container>
        </header>

        <main class="flex-grow-1">
            <vibe-container class="py-5 text-center">
                <h1 class="h3">Sticky footer</h1>
                <p class="text-muted">Pin a footer to the bottom of the viewport when the page content is short.</p>
                <vibe-button variant="primary">
                    <vibe-icon icon="arrow-down" class="me-1"></vibe-icon>
                    The footer stays below
                </vibe-button>
            </vibe-container>
        </main>

        <footer class="mt-auto py-3 bg-body-tertiary border-top">
            <vibe-container class="text-center text-muted">
                <small>Built with VibeUI by <a href="https://technosorcery.com" class="text-decoration-none">TechnoSorcery.com</a></small>
            </vibe-container>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../dist/vibeui.umd.js"></script>
    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    navItems: [
                        { text: 'Home', href: '#', active: true },
                        { text: 'About', href: '#' },
                        { text: 'Contact', href: '#' }
                    ]
                }
            }
        }).use(VibeUI.default).mount('#app');
    </script>
</body>
</html>
