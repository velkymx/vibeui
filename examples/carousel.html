<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel - VibeUI Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../dist/vibeui.css">
    <style>
        .marketing-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; }
        .featurette-img { width: 100%; border-radius: .5rem; object-fit: cover; }
    </style>

    <!-- VibeCarousel loads Bootstrap JS internally via `import('bootstrap')`; the UMD bundle
         keeps that bare specifier, so the page maps it here. -->
    <script type="importmap">
      {
        "imports": {
          "bootstrap": "https://esm.sh/bootstrap@5.3.0"
        }
      }
    </script>
</head>
<body>
    <div id="app">
        <vibe-navbar variant="dark" expand="lg" position="sticky-top">
            <vibe-navbar-brand href="#">
                <vibe-icon icon="images" class="me-2"></vibe-icon>
                Carousel Co.
            </vibe-navbar-brand>
            <vibe-navbar-toggle target="nav1"></vibe-navbar-toggle>
            <vibe-collapse id="nav1" is-nav>
                <vibe-navbar-nav :items="navItems" class="ms-auto"></vibe-navbar-nav>
            </vibe-collapse>
        </vibe-navbar>

        <!-- Full-width carousel -->
        <vibe-carousel :items="slides" dark :interval="4000" />

        <!-- Marketing columns -->
        <vibe-container class="py-5">
            <vibe-row :gutters="4" class="text-center">
                <vibe-col :lg="4" v-for="m in marketing" :key="m.title">
                    <img :src="m.img" class="marketing-img mb-3" :alt="m.title">
                    <h2 class="fw-normal">{{ m.title }}</h2>
                    <p>{{ m.body }}</p>
                    <vibe-button variant="secondary" outline>
                        View details <vibe-icon icon="chevron-right"></vibe-icon>
                    </vibe-button>
                </vibe-col>
            </vibe-row>
        </vibe-container>

        <hr class="featurette-divider mx-3">

        <!-- Featurettes (alternating) -->
        <vibe-container class="pb-5">
            <vibe-row
                v-for="(f, i) in featurettes"
                :key="f.title"
                class="align-items-center py-4"
            >
                <vibe-col :md="7" :order="i % 2 === 0 ? 1 : 2">
                    <h2 class="fw-normal">{{ f.title }} <span class="text-muted">{{ f.subtitle }}</span></h2>
                    <p class="lead">{{ f.body }}</p>
                </vibe-col>
                <vibe-col :md="5" :order="i % 2 === 0 ? 2 : 1">
                    <img :src="f.img" class="featurette-img" :alt="f.title">
                </vibe-col>
            </vibe-row>
        </vibe-container>

        <footer class="bg-body-tertiary py-4">
            <vibe-container class="text-center text-muted">
                <small>Built with VibeUI by <a href="https://technosorcery.com" class="text-decoration-none">TechnoSorcery.com</a></small>
            </vibe-container>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../dist/vibeui.umd.js"></script>
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    navItems: [
                        { text: 'Home', href: '#', active: true },
                        { text: 'Gallery', href: '#' },
                        { text: 'About', href: '#' }
                    ],
                    slides: [
                        { src: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200', caption: 'Explore the wild', captionText: 'Stunning landscapes captured by our community.' },
                        { src: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1200', caption: 'Find your calm', captionText: 'Serene views from around the world.' },
                        { src: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1200', caption: 'Chase the light', captionText: 'Golden hours worth waking up for.' }
                    ],
                    marketing: [
                        { title: 'Heading', body: 'Some representative placeholder content for the columns.', img: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=300' },
                        { title: 'Heading', body: 'Another exciting bit of representative placeholder content.', img: 'https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=300' },
                        { title: 'Heading', body: 'And lastly this, the third column of representative content.', img: 'https://images.unsplash.com/photo-1500534623283-312aade485b7?w=300' }
                    ],
                    featurettes: [
                        { title: 'First featurette heading.', subtitle: "It'll blow your mind.", body: 'Pulls the eye with a strong image and clear copy alongside it.', img: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=500' },
                        { title: 'Oh yeah, this is another.', subtitle: "See? Alternating.", body: 'The image and text columns swap order on each row for visual rhythm.', img: 'https://images.unsplash.com/photo-1418065460487-3e41a6c84dc5?w=500' }
                    ]
                }
            }
        }).use(VibeUI.default).mount('#app');
    </script>
</body>
</html>
