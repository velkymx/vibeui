<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VibeUI - Mobile Dashboard Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: env(safe-area-inset-top, 0);
        }
        .vibe-nav-sidebar {
            width: 280px;
            height: 100vh;
            position: sticky;
            top: 0;
        }
        @media (max-width: 991.98px) {
            .vibe-nav-sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Mobile Navbar -->
        <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top d-lg-none">
            <div class="container-fluid">
                <button class="navbar-toggler border-0" type="button" @click="showSidebar = true">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <a class="navbar-brand fw-bold" href="#">VibeUI</a>
                <div class="dropdown">
                    <img src="https://github.com/mdo.png" width="32" height="32" class="rounded-circle" data-bs-toggle="dropdown">
                </div>
            </div>
        </nav>

        <div class="container-fluid">
            <div class="row">
                <!-- Desktop Sidebar -->
                <aside class="col-lg-3 col-xl-2 d-none d-lg-block bg-white border-end vibe-nav-sidebar p-3">
                    <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
                        <span class="fs-4 fw-bold">VibeUI</span>
                    </a>
                    <hr>
                    <ul class="nav nav-pills flex-column mb-auto">
                        <li class="nav-item"><a href="#" class="nav-link active">Dashboard</a></li>
                        <li><a href="#" class="nav-link link-body-emphasis">Orders</a></li>
                        <li><a href="#" class="nav-link link-body-emphasis">Products</a></li>
                        <li><a href="#" class="nav-link link-body-emphasis">Customers</a></li>
                    </ul>
                </aside>

                <!-- Main Content -->
                <main class="col-lg-9 col-xl-10 ms-sm-auto px-md-4 py-4">
                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                        <h1 class="h2">Dashboard</h1>
                        <div class="btn-toolbar mb-2 mb-md-0">
                            <button type="button" class="btn btn-sm btn-outline-secondary dropdown-toggle">
                                This week
                            </button>
                        </div>
                    </div>

                    <!-- Reactive stats using useBreakpoints -->
                    <div class="row g-3">
                        <div :class="isMobile ? 'col-12' : 'col-md-4'" v-for="i in 3" :key="i">
                            <div class="card border-0 shadow-sm p-3">
                                <h6 class="text-muted mb-1">Total Revenue</h6>
                                <h3 class="mb-0">$45,231</h3>
                                <div class="text-success small">+20.1% from last month</div>
                            </div>
                        </div>
                    </div>

                    <h2 class="h4 mt-5 mb-3">Recent Transactions</h2>
                    <!-- Stackable Data Table -->
                    <div class="vibe-datatable-wrapper">
                        <table class="table vibe-table-stack">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Customer</th>
                                    <th class="text-end">Amount</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="i in 5" :key="i">
                                    <td data-label="Date">Oct 24, 2023</td>
                                    <td data-label="Status"><span class="badge bg-success-subtle text-success-emphasis">Paid</span></td>
                                    <td data-label="Customer">John Doe</td>
                                    <td data-label="Amount" class="text-end fw-bold">$250.00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </main>
            </div>
        </div>

        <!-- Mobile Offcanvas Sidebar -->
        <div class="offcanvas offcanvas-start" :class="{ show: showSidebar }" tabindex="-1" id="mobileSidebar">
            <div class="offcanvas-header border-bottom">
                <h5 class="offcanvas-title fw-bold">VibeUI</h5>
                <button type="button" class="btn-close" @click="showSidebar = false"></button>
            </div>
            <div class="offcanvas-body p-0">
                <ul class="nav nav-pills flex-column">
                    <li class="nav-item"><a href="#" class="nav-link active rounded-0">Dashboard</a></li>
                    <li><a href="#" class="nav-link link-body-emphasis rounded-0">Orders</a></li>
                    <li><a href="#" class="nav-link link-body-emphasis rounded-0">Products</a></li>
                    <li><a href="#" class="nav-link link-body-emphasis rounded-0">Customers</a></li>
                </ul>
            </div>
        </div>
        <div class="offcanvas-backdrop fade show" v-if="showSidebar" @click="showSidebar = false"></div>
    </div>

    <!-- This example uses standard HTML/CSS to demonstrate the compiled output patterns of VibeUI components -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp, ref, computed, onMounted, onUnmounted } = Vue

        createApp({
            setup() {
                const showSidebar = ref(false)
                const width = ref(window.innerWidth)
                
                const updateWidth = () => width.value = window.innerWidth
                onMounted(() => window.addEventListener('resize', updateWidth))
                onUnmounted(() => window.removeEventListener('resize', updateWidth))

                const isMobile = computed(() => width.value < 768)

                return {
                    showSidebar,
                    isMobile
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
